name: Backend CI/CD

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - 'docker/Dockerfile.backend'
      - '.deployment-trigger'
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - 'docker/Dockerfile.backend'

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'backend/Vector.Api'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}/Vector.Api.csproj

      - name: Build project
        run: dotnet build ${{ env.PROJECT_PATH }}/Vector.Api.csproj --no-restore --configuration Release

      - name: Run tests
        run: |
          if [ -d "backend/Vector.Api.Tests" ]; then
            dotnet test backend/Vector.Api.Tests/Vector.Api.Tests.csproj --configuration Release --verbosity normal
          else
            echo "No test project found, skipping tests"
          fi

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: qa
      url: https://vector-backend-qa.onrender.com

    steps:
      - name: Trigger Render deploy (QA backend)
        run: |
          echo "Triggering QA backend deployment on Render..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND_QA }}" \
            --fail \
            --silent \
            --show-error
          echo "✅ QA backend deploy triggered on Render."
          echo "Monitor progress at: https://dashboard.render.com"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://vector-backend-prod.onrender.com

    steps:
      - name: Trigger Render deploy (Production backend)
        run: |
          echo "Triggering Production backend deployment on Render..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND_PROD }}" \
            --fail \
            --silent \
            --show-error
          echo "✅ Production backend deploy triggered on Render."
          echo "Monitor progress at: https://dashboard.render.com"
