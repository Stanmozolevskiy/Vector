name: Backend CI/CD

# Triggers:
#   develop branch → build + test + deploy to QA on Render
#   main branch    → build + test + deploy to Production on Render
on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - 'docker/Dockerfile.backend'
      - 'render.yaml'
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - 'docker/Dockerfile.backend'

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'backend/Vector.Api'
  TEST_PATH: 'backend/Vector.Api.Tests'

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build & Test
  # Runs on every push and PR to develop/main
  # ─────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}/Vector.Api.csproj

      - name: Build (Release)
        run: dotnet build ${{ env.PROJECT_PATH }}/Vector.Api.csproj --no-restore --configuration Release

      - name: Run unit tests
        run: |
          if [ -d "${{ env.TEST_PATH }}" ]; then
            dotnet test ${{ env.TEST_PATH }}/Vector.Api.Tests.csproj \
              --configuration Release \
              --verbosity normal \
              --logger "trx;LogFileName=test-results.trx"
          else
            echo "No test project found, skipping tests"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: '**/test-results.trx'
          if-no-files-found: ignore

  # ─────────────────────────────────────────
  # Job 2: Deploy to QA (develop branch only)
  # ─────────────────────────────────────────
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: qa
      url: https://qa-api.try-vector.com

    steps:
      - name: Trigger Render deploy — QA backend
        run: |
          HOOK="${{ secrets.RENDER_DEPLOY_HOOK_BACKEND_QA }}"
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_BACKEND_QA secret is not set. Add it in Settings → Secrets."
            exit 1
          fi
          echo "Triggering QA backend deployment on Render..."
          curl -X POST "$HOOK" --fail --silent --show-error
          echo "QA backend deploy triggered."

  # ─────────────────────────────────────────
  # Job 3: Deploy to Production (main only)
  # ─────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.try-vector.com

    steps:
      - name: Trigger Render deploy — Production backend
        run: |
          HOOK="${{ secrets.RENDER_DEPLOY_HOOK_BACKEND_PROD }}"
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_BACKEND_PROD secret is not set. Add it in Settings → Secrets."
            exit 1
          fi
          echo "Triggering Production backend deployment on Render..."
          curl -X POST "$HOOK" --fail --silent --show-error
          echo "Production backend deploy triggered."
