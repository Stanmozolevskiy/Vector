name: Frontend CI/CD

# Triggers:
#   develop branch → build + test + deploy to QA on Render
#   main branch    → build + test + deploy to Production on Render
on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - 'render.yaml'
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

env:
  NODE_VERSION: '20.x'
  PROJECT_PATH: 'frontend'

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build, Lint & Test
  # Runs on every push and PR to develop/main
  # ─────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_PATH }}
        run: npm ci

      - name: Run linter
        working-directory: ${{ env.PROJECT_PATH }}
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        working-directory: ${{ env.PROJECT_PATH }}
        run: npm run test -- --run
        continue-on-error: true

      - name: Build (production)
        working-directory: ${{ env.PROJECT_PATH }}
        run: npm run build
        env:
          # Used only for CI build validation — Render injects the real URL at deploy time
          VITE_API_URL: ${{ secrets.QA_API_URL || 'http://localhost:5000/api' }}

      - name: Verify build output
        run: |
          if [ ! -d "${{ env.PROJECT_PATH }}/dist" ]; then
            echo "Build failed — dist folder not found"
            exit 1
          fi
          echo "Build successful — dist folder exists"

  # ─────────────────────────────────────────
  # Job 2: Deploy to QA (develop branch only)
  # ─────────────────────────────────────────
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: qa
      url: https://qa.try-vector.com

    steps:
      - name: Trigger Render deploy — QA frontend
        run: |
          HOOK="${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND_QA }}"
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_FRONTEND_QA secret is not set. Add it in Settings → Secrets."
            exit 1
          fi
          echo "Triggering QA frontend deployment on Render..."
          curl -X POST "$HOOK" --fail --silent --show-error
          echo "QA frontend deploy triggered."

  # ─────────────────────────────────────────
  # Job 3: Deploy to Production (main only)
  # ─────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://try-vector.com

    steps:
      - name: Trigger Render deploy — Production frontend
        run: |
          HOOK="${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND_PROD }}"
          if [ -z "$HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_FRONTEND_PROD secret is not set. Add it in Settings → Secrets."
            exit 1
          fi
          echo "Triggering Production frontend deployment on Render..."
          curl -X POST "$HOOK" --fail --silent --show-error
          echo "Production frontend deploy triggered."
