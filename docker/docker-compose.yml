services:
  postgres:
    image: postgres:15
    container_name: vector-postgres
    environment:
      POSTGRES_DB: vector_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vector-network

  redis:
    image: redis:7-alpine
    container_name: vector-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vector-network

  minio:
    image: minio/minio:latest
    container_name: vector-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - vector-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: vector-backend
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=vector_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=${JWT_SECRET:-your-super-secret-key-change-in-production}
      - Jwt__Issuer=${JWT_ISSUER:-Vector}
      - Jwt__Audience=${JWT_AUDIENCE:-Vector}
      - Frontend__Url=http://localhost:3000
      - SendGrid__ApiKey=${SENDGRID_API_KEY}
      - SendGrid__FromEmail=${SENDGRID_FROM_EMAIL:-stanmozolevskiy90@gmail.com}
      - SendGrid__FromName=${SENDGRID_FROM_NAME:-Vector}
      # Storage: MinIO for local Docker (S3-compatible). Override with env for R2/AWS.
      - Storage__ServiceUrl=${STORAGE_SERVICE_URL:-http://minio:9000}
      - Storage__AccessKeyId=${STORAGE_ACCESS_KEY_ID:-minioadmin}
      - Storage__SecretAccessKey=${STORAGE_SECRET_ACCESS_KEY:-minioadmin}
      - Storage__BucketName=${STORAGE_BUCKET_NAME:-vector-uploads}
      - Storage__PublicUrl=${STORAGE_PUBLIC_URL:-http://localhost:9000/vector-uploads}
      - AWS__Region=${AWS_REGION:-us-east-1}
      - Judge0__BaseUrl=${JUDGE0_BASE_URL:-https://ce.judge0.com}
      - Judge0__ApiKey=${JUDGE0_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - vector-network
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: vector-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vector-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  vector-network:
    driver: bridge

