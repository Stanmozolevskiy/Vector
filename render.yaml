# Render Blueprint — defines all Vector platform services for QA and Production.
# Docs: https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this file to GitHub (repo root).
#   2. In Render Dashboard → New → Blueprint Instance → connect this repo.
#   3. Render auto-creates all services below.
#   4. After creation, fill in the env vars marked  sync: false  in the Render dashboard.
#
# Cost estimate (~$31/month):
#   QA:   backend free ($0) + frontend static ($0) + postgres basic-256mb ($7) + keyvalue free ($0)
#   Prod: backend starter ($7) + frontend static ($0) + postgres basic-256mb ($7) + keyvalue starter ($10)

# ─────────────────────────────────────────────
# DATABASES
# ─────────────────────────────────────────────
databases:
  - name: vector-postgres-qa
    databaseName: vector_db
    user: vectoruser
    plan: basic-256mb
    region: oregon

  - name: vector-postgres-prod
    databaseName: vector_db
    user: vectoruser
    plan: basic-256mb
    region: oregon

# ─────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────
services:

  # ── Key Value / Redis (QA) ────────────────
  - type: keyvalue
    name: vector-redis-qa
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Key Value / Redis (Production) ────────
  - type: keyvalue
    name: vector-redis-prod
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Backend API (QA) ──────────────────────
  - type: web
    name: vector-backend-qa
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    branch: develop
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      - key: ASPNETCORE_URLS
        value: http://+:80
      - key: Development__AutoVerifyEmails
        value: "false"

      # Auto-wired from managed database
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: vector-postgres-qa
          property: connectionString

      # Auto-wired from managed Key Value (Redis)
      - key: ConnectionStrings__Redis
        fromService:
          name: vector-redis-qa
          type: keyvalue
          property: connectionString

      # Auto-generated secure JWT secret
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: Vector
      - key: Jwt__Audience
        value: Vector
      - key: Jwt__AccessTokenExpirationMinutes
        value: "1440"
      - key: Jwt__RefreshTokenExpirationDays
        value: "30"

      # Frontend URL for CORS — matches the QA frontend service name below
      - key: Frontend__Url
        value: https://vector-frontend-qa.onrender.com

      # ⚠️  Fill these in the Render dashboard after deployment
      - key: SendGrid__ApiKey
        sync: false
      - key: SendGrid__FromEmail
        sync: false
      - key: SendGrid__FromName
        value: Vector

      # Cloudflare R2 file storage (S3-compatible, replaces AWS S3)
      # Get these from: Cloudflare Dashboard → R2 → Manage API Tokens
      - key: Storage__ServiceUrl
        sync: false   # https://<account-id>.r2.cloudflarestorage.com
      - key: Storage__BucketName
        sync: false   # e.g. vector-uploads
      - key: Storage__AccessKeyId
        sync: false   # R2 API Token Access Key ID
      - key: Storage__SecretAccessKey
        sync: false   # R2 API Token Secret Access Key
      - key: Storage__PublicUrl
        sync: false   # https://pub-<hash>.r2.dev  (or your custom domain)

      - key: Judge0__BaseUrl
        value: https://ce.judge0.com
      - key: Judge0__ApiKey
        value: ""

  # ── Backend API (Production) ──────────────
  - type: web
    name: vector-backend-prod
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    branch: main
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:80
      - key: Development__AutoVerifyEmails
        value: "false"

      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: vector-postgres-prod
          property: connectionString

      - key: ConnectionStrings__Redis
        fromService:
          name: vector-redis-prod
          type: keyvalue
          property: connectionString

      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: Vector
      - key: Jwt__Audience
        value: Vector
      - key: Jwt__AccessTokenExpirationMinutes
        value: "1440"
      - key: Jwt__RefreshTokenExpirationDays
        value: "30"

      - key: Frontend__Url
        value: https://vector-frontend-prod.onrender.com

      - key: SendGrid__ApiKey
        sync: false
      - key: SendGrid__FromEmail
        sync: false
      - key: SendGrid__FromName
        value: Vector

      # Cloudflare R2 file storage (S3-compatible, replaces AWS S3)
      - key: Storage__ServiceUrl
        sync: false
      - key: Storage__BucketName
        sync: false
      - key: Storage__AccessKeyId
        sync: false
      - key: Storage__SecretAccessKey
        sync: false
      - key: Storage__PublicUrl
        sync: false

      - key: Judge0__BaseUrl
        value: https://ce.judge0.com
      - key: Judge0__ApiKey
        value: ""

  # ── Frontend Static Site (QA) ─────────────
  # Static sites on Render are FREE and served via CDN.
  # Render builds from source — no Docker needed.
  - type: web
    name: vector-frontend-qa
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    branch: develop
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Points to the QA backend — matches service name above
      - key: VITE_API_URL
        value: https://vector-backend-qa.onrender.com/api

  # ── Frontend Static Site (Production) ─────
  - type: web
    name: vector-frontend-prod
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    branch: main
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://vector-backend-prod.onrender.com/api
